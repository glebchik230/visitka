<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Малориса</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffeef5, #f5f5f5);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  width: 100%;
  max-width: 350px;
  padding: 20px;
}

/* Переключатель городов */
.city-switch {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.city-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #eee;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.city-btn.active {
  background: #ff8fb1;
  color: white;
}

/* Логотип */
.logo {
  width: 90px;
  height: 90px;
  margin: 0 auto 15px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff9ecb, #ff6fa5);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 32px;
}

/* Текст */
h1 {
  margin: 5px 0;
}

p {
  color: #666;
  margin-bottom: 20px;
}

/* Кнопки */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  background: white;
  color: black;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <!-- ГОРОДА -->
  <div class="city-switch">
    <button class="city-btn active" onclick="setCity('raduzhny')">Радужный</button>
    <button class="city-btn" onclick="setCity('tyumen')">Тюмень</button>
  </div>

  <!-- ЛОГО -->
  <div class="logo">
  <img src="https://ССЫЛКА_НА_ТВОЙ_ЛОГО.png" alt="Логотип">
</div>

  <h1>Малориса</h1>
  <p id="cityText">Радужный</p>

  <!-- КНОПКИ -->
  <div class="buttons">
    <a id="tg" href="#" class="btn" target="_blank">Telegram</a>
    <a id="vk" href="#" class="btn" target="_blank">VK</a>
    <a id="site" href="#" class="btn" target="_blank">Сайт</a>
  </div>

</div>

<script>
let currentCity = 'raduzhny';

const links = {
  raduzhny: {
    name: "Радужный",
    tg: "https://t.me/ТВОЙ_РАДУЖНЫЙ",
    vk: "https://vk.com/РАДУЖНЫЙ",
    site: "https://site-raduzhny.ru"
  },
  tyumen: {
    name: "Тюмень",
    tg: "https://t.me/ТВОЙ_ТЮМЕНЬ",
    vk: "https://vk.com/ТЮМЕНЬ",
    site: "https://site-tyumen.ru"
  }
};

function setCity(city) {
  currentCity = city;

  document.getElementById("cityText").innerText = links[city].name;

  document.getElementById("tg").href = links[city].tg;
  document.getElementById("vk").href = links[city].vk;
  document.getElementById("site").href = links[city].site;

  document.querySelectorAll(".city-btn").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
}

// Инициализация
setCity('raduzhny');
</script>

</body>
</html>
