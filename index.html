<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Малориса</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffeef5, #f5f5f5);
  color: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* Контейнер */
.container {
  text-align: center;
  padding: 20px;
  animation: fadeIn 1.2s ease;
}

/* Логотип */
.logo {
  width: 90px;
  height: 90px;
  margin: 0 auto 15px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff9ecb, #ff6fa5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  animation: float 3s ease-in-out infinite;
}

/* Заголовок */
h1 {
  font-size: 28px;
  margin-bottom: 8px;
}

/* Подзаголовок */
p {
  font-size: 14px;
  margin-bottom: 25px;
  color: #666;
}

/* Кнопки */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Кнопка */
.btn {
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: white;
  cursor: pointer;
  text-decoration: none;
  color: #000;
  font-size: 16px;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.2s;
}

/* Hover */
.btn:hover {
  transform: scale(1.05);
}

/* Анимации */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

/* Адаптация под большие экраны */
@media (min-width: 600px) {
  .buttons {
    flex-direction: row;
  }

  .btn {
    width: 120px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- ЛОГО -->
  <div class="logo">
    <img src="https://ams2-cdn.2gis.com/previews/1229970525942448131/1d1c8e68-ded3-44ca-b30f-cc7ac8d82cfb/1/ru/image_72x72.png" alt="Логотип">
  </div>

  <h1>Малориса</h1>
  <p>Ресторан доставки</p>

  <div class="buttons">
    <a href="https://t.me/malorisa72_bot" class="btn">Telegram</a>
    <a href="#" class="btn">Max</a>
    <a href="#" class="btn">VK</a>
  </div>

</div>

</body>
</html>
